<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>RankED — ER Diagram</title>
<style>
  body { margin: 0; background: #0f172a; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 32px 24px; }
  h1 { color: #f1f5f9; font-size: 20px; font-weight: 700; margin: 0 0 6px; }
  p  { color: #64748b; font-size: 12px; margin: 0 0 28px; }
  #erd { background: #0f172a; width: 100%; max-width: 960px; }
  #erd svg { width: 100% !important; height: auto !important; }
</style>
</head>
<body>
<h1>RankED — Entity Relationship Diagram</h1>
<p>User · Match · Question · Submission — derived from Mongoose models</p>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  fontFamily: "'Segoe UI', sans-serif",
  themeVariables: {
    fontSize: '14px',
    lineColor: '#334155',
    textColor: '#cbd5e1',
    primaryColor: '#1e293b',
    primaryTextColor: '#f1f5f9',
    primaryBorderColor: '#334155',
    edgeLabelBackground: '#0f172a',
    background: '#0f172a',
  },
});
const diagram = `erDiagram
  USER {
    ObjectId _id PK
    string name
    string email
    string password
    string role
    string targetExam
    string[] weakTopics
    date createdAt
    date updatedAt
  }

  MATCH {
    ObjectId _id PK
    string mode
    string status
    string scoringStrategy
    string subject
    string topic
    string roomCode
    int duration
    date startedAt
    date endedAt
    ObjectId winnerId FK
    date createdAt
    date updatedAt
  }

  MATCH_PLAYER {
    ObjectId userId FK
    string name
    int score
    bool isReady
  }

  QUESTION {
    ObjectId _id PK
    string type
    string subject
    string topic
    string content
    string[] options
    int correctOption
    int correctAnswer
    int[] correctOptions
    string difficulty
    int marks
    bool isActive
    date createdAt
    date updatedAt
  }

  SUBMISSION {
    ObjectId _id PK
    ObjectId matchId FK
    ObjectId userId FK
    ObjectId questionId FK
    mixed answer
    bool isCorrect
    int scoreAwarded
    int timeTaken
    date createdAt
  }

  USER ||--o{ MATCH_PLAYER : "participates as"
  MATCH ||--|{ MATCH_PLAYER : "has players (embedded)"
  MATCH }o--o{ QUESTION : "contains (ref array)"
  USER ||--o{ SUBMISSION : "makes"
  MATCH ||--o{ SUBMISSION : "has"
  QUESTION ||--o{ SUBMISSION : "answered in"
  USER |o--o{ MATCH : "wins (winnerId)"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
</script>
</body>
</html>
