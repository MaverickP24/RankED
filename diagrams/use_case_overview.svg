  <!-- legend -->
  <rect x="218" y="886" width="764" height="26" rx="6" fill="#0a0f1a" stroke="#1e293b" stroke-width="1"/>
  <line x1="238" y1="899" x2="270" y2="899" stroke="#64748b" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="276" y="903" font-size="11" fill="#94a3b8">association (user triggers UC)</text>
  <ellipse cx="465" cy="899" rx="28" ry="10" fill="none" stroke="#64748b" stroke-width="1"/>
  <text x="465" y="903" text-anchor="middle" font-size="10" fill="#94a3b8">UC</text>
  <text x="497" y="903" font-size="11" fill="#94a3b8">base use case</text>
  <text x="620" y="903" font-size="11" fill="#94a3b8">|  [protect] = JWT middleware  |  [adminOnly] = role guard</text>
</svg>
