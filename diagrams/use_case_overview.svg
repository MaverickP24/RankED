<svg width="1200" height="920" viewBox="0 0 1200 920" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" role="img">
  <title>RankED Use Case Diagram — Overview</title>
  <desc>Actors: Guest, Registered User, Admin. Use cases from auth.js, battle.js, questions.js, GameEngine.js, SocketManager.js.</desc>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ai" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="aa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1200" height="920" fill="#0f172a"/>
  <text x="600" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#f1f5f9">RankED — Use Case Diagram (Overview)</text>
  <text x="600" y="54" text-anchor="middle" font-size="11" fill="#64748b">auth.js · battle.js · questions.js · GameEngine.js · SocketManager.js · models</text>
  <line x1="60" y1="66" x2="1140" y2="66" stroke="#1e293b" stroke-width="1"/>
  <rect x="200" y="78" width="800" height="814" rx="16" fill="none" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="600" y="98" text-anchor="middle" font-size="12" fill="#3b82f6">« system boundary »  RankED Platform</text>

  <!-- AUTH MODULE -->
  <rect x="218" y="110" width="764" height="118" rx="10" fill="#130f24" stroke="#2d1e50" stroke-width="1"/>
  <text x="236" y="128" font-size="11" fill="#5a3e8a" font-weight="600" letter-spacing="1">AUTH MODULE</text>
  <ellipse cx="330" cy="174" rx="96" ry="26" fill="#1a1035" stroke="#4c2e8a" stroke-width="1"/>
  <text x="330" y="174" text-anchor="middle" font-size="13" fill="#ddd6fe" dominant-baseline="central">Register</text>
  <text x="330" y="192" text-anchor="middle" font-size="10" fill="#7c5cbf">POST /api/auth/register</text>
  <ellipse cx="568" cy="174" rx="88" ry="26" fill="#1a1035" stroke="#4c2e8a" stroke-width="1"/>
  <text x="568" y="174" text-anchor="middle" font-size="13" fill="#ddd6fe" dominant-baseline="central">Log in</text>
  <text x="568" y="192" text-anchor="middle" font-size="10" fill="#7c5cbf">POST /api/auth/login</text>
  <ellipse cx="830" cy="174" rx="120" ry="26" fill="#1a1035" stroke="#4c2e8a" stroke-width="1"/>
  <text x="830" y="174" text-anchor="middle" font-size="13" fill="#ddd6fe" dominant-baseline="central">View profile</text>
  <text x="830" y="192" text-anchor="middle" font-size="10" fill="#7c5cbf">GET /api/auth/me  [protect]</text>

  <!-- BATTLE MODULE -->
  <rect x="218" y="248" width="764" height="282" rx="10" fill="#0b1a12" stroke="#173322" stroke-width="1"/>
  <text x="236" y="266" font-size="11" fill="#2d5a3e" font-weight="600" letter-spacing="1">BATTLE MODULE — routes + GameEngine + SocketManager</text>
  <ellipse cx="316" cy="314" rx="104" ry="26" fill="#0d1f14" stroke="#1e4028" stroke-width="1"/>
  <text x="316" y="314" text-anchor="middle" font-size="13" fill="#bbf7d0" dominant-baseline="central">Create battle</text>
  <text x="316" y="332" text-anchor="middle" font-size="10" fill="#3d7a52">POST /api/battle/create</text>
  <ellipse cx="560" cy="314" rx="104" ry="26" fill="#0d1f14" stroke="#1e4028" stroke-width="1"/>
  <text x="560" y="314" text-anchor="middle" font-size="13" fill="#bbf7d0" dominant-baseline="central">Join battle</text>
  <text x="560" y="332" text-anchor="middle" font-size="10" fill="#3d7a52">POST /api/battle/join/:id  [protect]</text>
  <ellipse cx="832" cy="314" rx="124" ry="26" fill="#0d1f14" stroke="#1e4028" stroke-width="1"/>
  <text x="832" y="314" text-anchor="middle" font-size="13" fill="#bbf7d0" dominant-baseline="central">View battle info</text>
  <text x="832" y="332" text-anchor="middle" font-size="10" fill="#3d7a52">GET /api/battle/:matchId  [protect]</text>
  <ellipse cx="316" cy="408" rx="116" ry="26" fill="#0d1f14" stroke="#1e4028" stroke-width="1"/>
  <text x="316" y="408" text-anchor="middle" font-size="13" fill="#bbf7d0" dominant-baseline="central">Submit answer</text>
  <text x="316" y="426" text-anchor="middle" font-size="10" fill="#3d7a52">socket: submit_answer</text>
  <ellipse cx="600" cy="408" rx="136" ry="26" fill="#0d1f14" stroke="#1e4028" stroke-width="1"/>
  <text x="600" y="408" text-anchor="middle" font-size="13" fill="#bbf7d0" dominant-baseline="central">View live leaderboard</text>
  <text x="600" y="426" text-anchor="middle" font-size="10" fill="#3d7a52">socket: leaderboard_update</text>
  <ellipse cx="316" cy="496" rx="104" ry="26" fill="#0d1f14" stroke="#1e4028" stroke-width="1"/>
  <text x="316" y="496" text-anchor="middle" font-size="13" fill="#bbf7d0" dominant-baseline="central">End battle</text>
  <text x="316" y="514" text-anchor="middle" font-size="10" fill="#3d7a52">socket: end_battle</text>
  <ellipse cx="628" cy="496" rx="136" ry="26" fill="#0d1f14" stroke="#1e4028" stroke-width="1"/>
  <text x="628" y="496" text-anchor="middle" font-size="13" fill="#bbf7d0" dominant-baseline="central">View battle history</text>
  <text x="628" y="514" text-anchor="middle" font-size="10" fill="#3d7a52">GET /api/battle/user/history  [protect]</text>

  <!-- QUESTIONS MODULE -->
  <rect x="218" y="550" width="764" height="118" rx="10" fill="#100e04" stroke="#322c0a" stroke-width="1"/>
  <text x="236" y="568" font-size="11" fill="#4a3a0a" font-weight="600" letter-spacing="1">QUESTIONS MODULE — routes + QuestionFactory</text>
  <ellipse cx="364" cy="614" rx="128" ry="26" fill="#16120a" stroke="#3a2e0a" stroke-width="1"/>
  <text x="364" y="614" text-anchor="middle" font-size="13" fill="#fef3c7" dominant-baseline="central">Browse questions</text>
  <text x="364" y="632" text-anchor="middle" font-size="10" fill="#78580a">GET /api/questions  [protect]</text>
  <ellipse cx="700" cy="614" rx="148" ry="26" fill="#16120a" stroke="#3a2e0a" stroke-width="1"/>
  <text x="700" y="614" text-anchor="middle" font-size="13" fill="#fef3c7" dominant-baseline="central">Get random questions</text>
  <text x="700" y="632" text-anchor="middle" font-size="10" fill="#78580a">GET /api/questions/random  [protect]</text>

  <!-- ADMIN MODULE -->
  <rect x="218" y="688" width="764" height="186" rx="10" fill="#100808" stroke="#300a0a" stroke-width="1"/>
  <text x="236" y="706" font-size="11" fill="#5a1a1a" font-weight="600" letter-spacing="1">ADMIN MODULE — questions routes [protect + adminOnly]</text>
  <ellipse cx="330" cy="752" rx="112" ry="26" fill="#180808" stroke="#440a0a" stroke-width="1"/>
  <text x="330" y="752" text-anchor="middle" font-size="13" fill="#fecaca" dominant-baseline="central">Create question</text>
  <text x="330" y="770" text-anchor="middle" font-size="10" fill="#7a2020">POST /api/questions  [adminOnly]</text>
  <ellipse cx="590" cy="752" rx="112" ry="26" fill="#180808" stroke="#440a0a" stroke-width="1"/>
  <text x="590" y="752" text-anchor="middle" font-size="13" fill="#fecaca" dominant-baseline="central">Update question</text>
  <text x="590" y="770" text-anchor="middle" font-size="10" fill="#7a2020">PUT /api/questions/:id  [adminOnly]</text>
  <ellipse cx="864" cy="752" rx="112" ry="26" fill="#180808" stroke="#440a0a" stroke-width="1"/>
  <text x="864" y="752" text-anchor="middle" font-size="13" fill="#fecaca" dominant-baseline="central">Deactivate question</text>
  <text x="864" y="770" text-anchor="middle" font-size="10" fill="#7a2020">DELETE /api/questions/:id  [adminOnly]</text>
  <ellipse cx="490" cy="840" rx="164" ry="26" fill="#180808" stroke="#440a0a" stroke-width="1"/>
  <text x="490" y="840" text-anchor="middle" font-size="13" fill="#fecaca" dominant-baseline="central">Configure scoring strategy</text>
  <text x="490" y="858" text-anchor="middle" font-size="10" fill="#7a2020">JEE_MAIN · JEE_ADVANCED · SPEED_BASED · DIFFICULTY_WEIGHTED</text>

  <!-- ACTORS -->
  <!-- Guest -->
  <circle cx="110" cy="160" r="18" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="110" y1="178" x2="110" y2="224" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="84" y1="200" x2="136" y2="200" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="110" y1="224" x2="88" y2="250" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="110" y1="224" x2="132" y2="250" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="110" y="268" text-anchor="middle" font-size="13" font-weight="600" fill="#cbd5e1">Guest</text>
  <line x1="198" y1="174" x2="234" y2="174" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="198" y1="178" x2="480" y2="178" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#a)"/>

