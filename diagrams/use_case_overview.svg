  <line x1="110" y1="484" x2="88" y2="510" stroke="#38bdf8" stroke-width="1.5"/>
  <line x1="110" y1="484" x2="132" y2="510" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="110" y="528" text-anchor="middle" font-size="12" font-weight="600" fill="#38bdf8">Registered</text>
  <text x="110" y="544" text-anchor="middle" font-size="12" font-weight="600" fill="#38bdf8">User</text>
  <line x1="198" y1="406" x2="712" y2="184" stroke="#38bdf8" stroke-width="1" marker-end="url(#a)"/>
  <line x1="198" y1="414" x2="214" y2="322" stroke="#38bdf8" stroke-width="1" marker-end="url(#a)"/>
  <line x1="198" y1="420" x2="458" y2="322" stroke="#38bdf8" stroke-width="1" marker-end="url(#a)"/>
  <line x1="198" y1="426" x2="710" y2="322" stroke="#38bdf8" stroke-width="1" marker-end="url(#a)"/>
  <line x1="198" y1="432" x2="202" y2="416" stroke="#38bdf8" stroke-width="1" marker-end="url(#a)"/>
  <line x1="198" y1="438" x2="214" y2="504" stroke="#38bdf8" stroke-width="1" marker-end="url(#a)"/>
  <line x1="198" y1="444" x2="494" y2="504" stroke="#38bdf8" stroke-width="1" marker-end="url(#a)"/>
  <line x1="198" y1="450" x2="238" y2="622" stroke="#38bdf8" stroke-width="1" marker-end="url(#a)"/>

  <!-- Admin -->
  <circle cx="1090" cy="730" r="18" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="1090" y1="748" x2="1090" y2="794" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="1064" y1="770" x2="1116" y2="770" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="1090" y1="794" x2="1068" y2="820" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="1090" y1="794" x2="1112" y2="820" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1090" y="838" text-anchor="middle" font-size="13" font-weight="600" fill="#f59e0b">Admin</text>
  <line x1="982" y1="742" x2="976" y2="752" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#aa)"/>
  <line x1="982" y1="748" x2="702" y2="756" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#aa)"/>
